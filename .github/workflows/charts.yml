name: Release Charts

on:
  push:
    branches:
      - '**'

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      # On master we ship the chart as-is (name=vyhub, version=Chart.yaml).
      # On every other branch we ship the same chart contents under the name
      # `vyhub-test` with the SemVer pre-release tag `<version>-<branch>` so
      # feature branches publish testable artifacts without colliding with
      # production releases.
      - name: Rewrite Chart.yaml for non-master branches
        if: github.ref_name != 'master'
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          # SemVer pre-release identifiers may only contain [0-9A-Za-z-];
          # squash anything else into a single dash and trim.
          SANITIZED="$(printf '%s' "$BRANCH" \
            | tr -c 'a-zA-Z0-9-' '-' \
            | sed -E 's/-+/-/g; s/^-//; s/-$//')"
          BASE_VERSION="$(yq -r '.version' charts/vyhub/Chart.yaml)"
          NEW_VERSION="${BASE_VERSION}-${SANITIZED}"
          echo "Publishing as vyhub-test@${NEW_VERSION}"
          yq -i ".name = \"vyhub-test\" | .version = \"${NEW_VERSION}\"" \
            charts/vyhub/Chart.yaml

      - name: Update chart dependencies
        run: helm dependency update charts/vyhub

      - name: Run chart-releaser
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          skip_existing: true
