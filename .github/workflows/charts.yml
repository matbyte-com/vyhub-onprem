name: Release Charts

on:
  push:
    branches:
      - '**'

jobs:
  release:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config user.name "$GITHUB_ACTOR"
          git config user.email "$GITHUB_ACTOR@users.noreply.github.com"

      - name: Install Helm
        uses: azure/setup-helm@v4
        env:
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"

      # On master we ship the chart as-is (name=vyhub, version=Chart.yaml).
      # On every other branch we ship the same chart contents under the name
      # `vyhub-test` with the SemVer pre-release tag `<version>-<branch>` so
      # feature branches publish testable artifacts without colliding with
      # production releases.
      - name: Rewrite Chart.yaml for non-master branches
        if: github.ref_name != 'master'
        run: |
          set -euo pipefail
          BRANCH="${GITHUB_REF_NAME}"
          # SemVer pre-release identifiers may only contain [0-9A-Za-z-];
          # squash anything else into a single dash and trim.
          SANITIZED="$(printf '%s' "$BRANCH" \
            | tr -c 'a-zA-Z0-9-' '-' \
            | sed -E 's/-+/-/g; s/^-//; s/-$//')"
          BASE_VERSION="$(yq -r '.version' charts/vyhub/Chart.yaml)"
          NEW_VERSION="${BASE_VERSION}-${SANITIZED}"
          echo "Publishing as vyhub-test@${NEW_VERSION}"
          yq -i ".name = \"vyhub-test\" | .version = \"${NEW_VERSION}\"" \
            charts/vyhub/Chart.yaml

      # chart-releaser's `cr package` shells out to `helm dependency build`,
      # which only resolves repository: URLs that are already registered with
      # the local helm client. (OCI deps like bitnamicharts work without
      # `repo add`; classic https:// repos do not.)
      - name: Register chart dependency repositories
        run: |
          helm repo add grafana https://grafana.github.io/helm-charts
          helm repo update

      - name: Update chart dependencies
        run: helm dependency update charts/vyhub

      # master: cut a real GitHub release + update the gh-pages chart index.
      - name: Run chart-releaser
        if: github.ref_name == 'master'
        uses: helm/chart-releaser-action@v1.6.0
        env:
          CR_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
        with:
          skip_existing: true

      # Non-master: package the (vyhub-test) chart and attach it to the
      # workflow run as a downloadable artifact. No GitHub release is cut,
      # so feature-branch pushes don't pollute the releases list.
      - name: Package test chart
        if: github.ref_name != 'master'
        run: |
          mkdir -p .cr-release-packages
          helm package charts/vyhub --destination .cr-release-packages

      - name: Upload test chart artifact
        if: github.ref_name != 'master'
        uses: actions/upload-artifact@v4
        with:
          name: vyhub-test-${{ github.ref_name }}
          path: .cr-release-packages/*.tgz
          if-no-files-found: error
