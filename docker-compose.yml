services:
  app:
    image: registry.matbyte.com/vyhub/vyhub-onprem:latest
    depends_on:
      - db
      - geoip-api
      - pdf-api
      - loki
    command: python -m scripts.server_run
    volumes:
      - ./.env:/opt/vyhub/.env
      - ./web:/opt/vyhub/web
    extra_hosts:
      - "host.docker.internal:host-gateway"
  db:
    image: postgres:17
    # ports:
    #  - 15432:5432
    environment:
      POSTGRES_USER: postgres # superuser
      POSTGRES_DB: vyhub
      POSTGRES_VYHUB_USER: vyhub
    volumes:
      - vyhub-db:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d
  geoip-api:
    image: observabilitystack/geoip-api:latest
  pdf-api:
    image: ghcr.io/matbyte-com/htmltopdf-api:1.1.0
    stop_signal: SIGKILL
  loki:
    image: grafana/loki:2.8.0
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki/loki-config.yaml:/etc/loki/local-config.yaml
      - vyhub-loki:/loki
  nginx:
    image: nginx:1
    volumes:
      - ./nginx/certs:/etc/certificates/vyhub
      - ./nginx/vyhub.conf:/etc/nginx/conf.d/default.conf
      - ./web:/vyhub-web
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - app
  db-backup:
    image: prodrigestivill/postgres-backup-local:17
    restart: unless-stopped
    depends_on:
      - db
    volumes:
      - vyhub-db-backups:/backups
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: vyhub
      POSTGRES_USER: vyhub
      POSTGRES_PASSWORD: ${VYHUB_DB_PASSWORD}
      SCHEDULE: "@daily"
      BACKUP_KEEP_DAYS: 7
      BACKUP_KEEP_WEEKS: 4
      BACKUP_KEEP_MONTHS: 6
      POSTGRES_EXTRA_OPTS: "--no-owner --no-acl"
      HEALTHCHECK_PORT: 8080
volumes:
  vyhub-db:
  vyhub-loki:
  vyhub-db-backups:
